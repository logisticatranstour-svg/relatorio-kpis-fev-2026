name: Atualizar dashboard diariamente

on:
  schedule:
    - cron: "59 2 * * *"  # 23:59 (America/Sao_Paulo) = 02:59 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pandas numpy

      - name: Generate index.html
        run: python build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Atualiza dashboard automaticamente" || echo "Sem mudanças"
          git push
